<html lang="en">

<meta charset="UTF-8">

<title>Product Price List 2026.05</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif; background: #d8dce8; color: #1a1a2e; font-size: 15px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
.page-wrap { width: 100%; max-width: 600px; background: #f0f2f5; min-height: 100vh; box-shadow: 0 0 30px rgba(0,0,0,0.2); }

/* HEADER */
.header { background: #1e3a6e; padding: 16px 16px 13px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 6px rgba(0,0,0,0.2); max-width: 600px; width: 100%; }
.header h1 { font-size: 20px; font-weight: 900; color: #fff; letter-spacing: -0.5px; }
.header p { font-size: 12px; color: #a8c4f0; margin-top: 3px; font-weight: 600; }
.header .notice { font-size: 10px; color: #7da8e0; margin-top: 5px; font-weight: 400; line-height: 1.5; }

/* SEARCH */
.search-wrap { padding: 12px 12px 0; }
.search-wrap input {
  width: 100%; padding: 12px 16px;
  border-radius: 10px; border: 2px solid #d0d7e8;
  font-size: 15px; outline: none;
  background: #fff; color: #1a1a2e;
}
.search-wrap input::placeholder { color: #9aa5be; }
.search-wrap input:focus { border-color: #1e3a6e; }

/* TABS */
.tabs { display: flex; gap: 7px; padding: 12px; overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab {
  white-space: nowrap; padding: 9px 16px;
  border-radius: 8px; font-size: 13px; font-weight: 700;
  cursor: pointer; border: 2px solid #d0d7e8;
  background: #fff; color: #5a6480; transition: all 0.15s;
  flex-shrink: 0;
}
.tab.active { background: #1e3a6e; color: #fff; border-color: #1e3a6e; }

/* CARDS */
.cards { padding: 0 12px 24px; }

/* MODEL CARD */
.model-card {
  background: #fff; border-radius: 12px;
  margin-bottom: 12px; overflow: hidden;
  border: 1.5px solid #d8deec;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

/* CARD HEADER */
.card-head {
  padding: 12px 15px 10px;
  display: flex; justify-content: space-between; align-items: center;
}
.model-name { font-size: 17px; font-weight: 900; color: #fff; letter-spacing: -0.3px; }
.cat-badge {
  font-size: 11px; font-weight: 700;
  padding: 3px 9px; border-radius: 5px;
  background: rgba(255,255,255,0.25); color: #fff;
  white-space: nowrap;
}

/* CARD BODY */
.card-body { padding: 12px 14px 14px; }

/* SECTION */
.sec { margin-bottom: 12px; }
.sec:last-child { margin-bottom: 0; }
.sec-title {
  font-size: 11px; font-weight: 800; color: #8892b0;
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 7px;
}

/* ILSIBOL */
.ilsibol-box {
  background: #f4f6fb; border-radius: 8px;
  padding: 11px 14px;
  display: flex; justify-content: space-between; align-items: center;
  border: 1.5px solid #dde3f0;
}
.ilsibol-label { font-size: 14px; color: #6b7a99; font-weight: 600; }
.ilsibol-price { font-size: 24px; font-weight: 900; color: #1a1a2e; }

/* RENTAL */
.rental-block { margin-bottom: 7px; }
.rental-type-bar {
  font-size: 12px; font-weight: 800;
  padding: 6px 10px; border-radius: 6px 6px 0 0;
}
.rental-type-bar.self  { background: #dbeafe; color: #1e40af; }
.rental-type-bar.visit { background: #dcfce7; color: #166534; }

.rental-table { width: 100%; border-collapse: collapse; border-radius: 0 0 6px 6px; overflow: hidden; }
.rental-table th {
  font-size: 11px; font-weight: 700; color: #6b7a99;
  padding: 7px 8px; text-align: center;
  border-bottom: 1.5px solid #e8edf5;
  background: #f8fafc;
}
.rental-table th:first-child { text-align: left; padding-left: 11px; }
.rental-table td {
  padding: 9px 8px; text-align: center;
  font-size: 16px; font-weight: 800;
  border-bottom: 1px solid #f0f2f8;
  background: #fff;
}
.rental-table td:first-child {
  text-align: left; padding-left: 11px;
  font-size: 13px; font-weight: 700; color: #8892b0;
}
.rental-table tr:last-child td { border-bottom: none; }
.self-price  { color: #1e40af; }
.visit-price { color: #166534; }

/* MEM / WECARE */
.service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.service-box { border-radius: 8px; padding: 10px 12px; }
.service-label { font-size: 12px; font-weight: 700; margin-bottom: 4px; }
.service-price { font-size: 19px; font-weight: 900; }
.service-mo { font-size: 11px; font-weight: 600; opacity: 0.65; }

.mem-self  { background: #eff6ff; }
.mem-self  .service-label { color: #1e40af; }
.mem-self  .service-price { color: #1d4ed8; }
.mem-visit { background: #f0fdf4; }
.mem-visit .service-label { color: #166534; }
.mem-visit .service-price { color: #15803d; }
.wc-self   { background: #fff1f2; }
.wc-self   .service-label { color: #9f1239; }
.wc-self   .service-price { color: #be123c; }
.wc-visit  { background: #fff7ed; }
.wc-visit  .service-label { color: #9a3412; }
.wc-visit  .service-price { color: #c2410c; }

/* FILTER */
.filter-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid #eef0f6;
}
.filter-item:last-child { border-bottom: none; }
.filter-name { font-size: 13px; color: #6b7a99; flex: 1; padding-right: 10px; }
.filter-price { font-size: 15px; font-weight: 800; color: #6d28d9; white-space: nowrap; }
.filter-bundle .filter-name { color: #5b21b6; font-weight: 700; }
.filter-bundle .filter-price { font-size: 16px; }

.divider { height: 1px; background: #eef0f6; margin: 10px 0; }
.note-text { font-size: 12px; color: #dc2626; font-style: italic; padding: 4px 0; }
.empty-msg { text-align: center; color: #9aa5be; font-size: 15px; padding: 50px 0; }
</style>

  const label = type === 'self' ? 'SELF (Self Care)' : 'VISIT (Visit Care)';
  const pc = type === 'self' ? 'self-price' : 'visit-price';
  const h36 = data['36'] !== undefined, h60 = data['60'] !== undefined, h72 = data['72'] !== undefined;
  return `<div class="rental-block">
    <div class="rental-type-bar ${cls}">${label}</div>
    <table class="rental-table">
      <tr>
        <th>Period</th>
        ${h36 ? '<th>36 mo.</th>' : ''}
        ${h60 ? '<th>60 mo.</th>' : ''}
        ${h72 ? '<th>72 mo.</th>' : ''}
      </tr>
      <tr>
        <td>DP $0</td>
        ${h36 ? `<td class="${pc}">${p(data['36'])}</td>` : ''}
        ${h60 ? `<td class="${pc}">${p(data['60'])}</td>` : ''}
        ${h72 ? `<td class="${pc}">${p(data['72'])}</td>` : ''}
      </tr>
      <tr>
        <td>DP $100</td>
        ${h36 ? `<td class="${pc}">${p(data['36d'])}</td>` : ''}
        ${h60 ? `<td class="${pc}">${p(data['60d'])}</td>` : ''}
        ${h72 ? `<td class="${pc}">${p(data['72d'])}</td>` : ''}
      </tr>
    </table>
  </div>`;
}

function buildCard(m) {
  const color = CAT_COLORS[m.cat] || '#1a1a2e';
  let html = `<div class="model-card">
    <div class="card-head" style="background:${color}">
      <span class="model-name">${m.model}</span>
      <span class="cat-badge">${m.cat}</span>
    </div>
    <div class="card-body">`;

  if (m.ilsibol && typeof m.ilsibol === 'number') {
    html += `<div class="sec">
      <div class="sec-title">One-Time Purchase</div>
      <div class="ilsibol-box">
        <span class="ilsibol-label">Cash / Card</span>
        <span class="ilsibol-price">${p(m.ilsibol)}</span>
      </div>
    </div>`;
  }

  if (m.rental && Object.keys(m.rental).length > 0) {
    html += `<div class="sec"><div class="sec-title">Rental</div>
    <div class="rental-block"><table class="rental-table">
      <tr><th>Period</th><th>60 mo.</th></tr>
      <tr><td>DP $500</td><td class="self-price">${p(m.rental['60d500'])}</td></tr>
    </table></div></div>`;
  }

  const hasR = (m.rs && Object.keys(m.rs).length > 0) || (m.rv && Object.keys(m.rv).length > 0) || m.rsNote;
  if (hasR) {
    html += `<div class="sec"><div class="sec-title">Rental (Monthly Payment)</div>`;
    if (m.rsNote) html += `<div class="note-text">${m.rsNote}</div>`;
    if (m.rs && Object.keys(m.rs).length > 0) html += rentalTable(m.rs, 'self');
    if (m.rv && Object.keys(m.rv).length > 0) html += rentalTable(m.rv, 'visit');
    html += `</div>`;
  }

  const hasMem = m.mem && (m.mem.self || m.mem.visit);
  const hasWC  = m.wc  && (m.wc.self  || m.wc.visit);
  if (hasMem || hasWC) {
    html += `<div class="divider"></div>
    <div class="sec">
      <div class="sec-title">Membership &amp; WeCare (Monthly)</div>
      <div class="service-grid">`;
    if (m.mem?.self)  html += `<div class="service-box mem-self"><div class="service-label">Membership SELF</div><div class="service-price">${p(m.mem.self)}<span class="service-mo">/mo</span></div></div>`;
    if (m.mem?.visit) html += `<div class="service-box mem-visit"><div class="service-label">Membership VISIT</div><div class="service-price">${p(m.mem.visit)}<span class="service-mo">/mo</span></div></div>`;
    if (m.wc?.self)   html += `<div class="service-box wc-self"><div class="service-label">WeCare SELF</div><div class="service-price">${p(m.wc.self)}<span class="service-mo">/mo</span></div></div>`;
    if (m.wc?.visit)  html += `<div class="service-box wc-visit"><div class="service-label">WeCare VISIT</div><div class="service-price">${p(m.wc.visit)}<span class="service-mo">/mo</span></div></div>`;
    html += `</div></div>`;
  }

  const filters = FILTERS.filter(f => f.model === m.model);
  if (filters.length > 0) {
    html += `<div class="divider"></div>
    <div class="sec"><div class="sec-title">Filter Price</div>`;
    for (const f of filters) {
      html += `<div class="filter-item${f.b ? ' filter-bundle' : ''}">
        <span class="filter-name">${f.name}</span>
        <span class="filter-price">${p(f.price)}</span>
      </div>`;
    }
    html += `</div>`;
  }

  html += `</div></div>`;
  return html;
}

// Tabs
const cats = ['All', ...new Set(MODELS.map(m => m.cat))];
const tabsEl = document.getElementById('tabsEl');
cats.forEach((cat, i) => {
  const t = document.createElement('div');
  t.className = 'tab' + (i === 0 ? ' active' : '');
  t.textContent = cat;
  t.dataset.cat = cat;
  t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    render();
  };
  tabsEl.appendChild(t);
});

function render() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const activeCat = document.querySelector('.tab.active')?.dataset.cat || 'All';
  const filtered = MODELS.filter(m => {
    const matchCat = activeCat === 'All' || m.cat === activeCat;
    const matchSearch = !search || m.model.toLowerCase().includes(search);
    return matchCat && matchSearch;
  });
  const el = document.getElementById('cardsEl');
  el.innerHTML = filtered.length === 0
    ? '<div class="empty-msg">No results found</div>'
    : filtered.map(buildCard).join('');
}

render();
</script>
</div>
</body>
</html>
